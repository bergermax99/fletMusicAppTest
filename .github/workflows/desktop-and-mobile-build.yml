name: All Builds - Flet

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

env:
  BUILD_NUMBER: 1
  BUILD_VERSION: 1.0.0
  PYTHON_VERSION: "3.12"
  FLUTTER_VERSION: "3.24.0"

  # Wichtig:
  # "." = Repository-Root
  # "src" = falls deine Flet-App in src/main.py liegt und du direkt src bauen willst
  APP_PATH: "."

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python --version
          pip --version
          flet --version
          flutter --version

      - name: Debug project files
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type f | sort

      - name: Build Linux
        run: |
          flutter config --no-analytics
          flet build linux "$APP_PATH" \
            --verbose \
            --build-number="$BUILD_NUMBER" \
            --build-version="$BUILD_VERSION"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux
          if-no-files-found: error

  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python --version
          pip --version
          flet --version
          flutter --version

      - name: Debug project files
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type f | sort

      - name: Build macOS
        run: |
          flutter config --no-analytics
          flet build macos "$APP_PATH" \
            --verbose \
            --build-number="$BUILD_NUMBER" \
            --build-version="$BUILD_VERSION"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: build/macos
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install flet
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          python --version
          pip --version
          flet --version
          flutter --version

      - name: Debug project files
        shell: pwsh
        run: |
          Get-Location
          Get-ChildItem -Force
          Get-ChildItem -Recurse -File | Select-Object -First 200 FullName

      - name: Build Windows
        shell: pwsh
        run: |
          flutter config --no-analytics
          flet build windows "$env:APP_PATH" `
            --verbose `
            --no-rich-output `
            --build-number="$env:BUILD_NUMBER" `
            --build-version="$env:BUILD_VERSION"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows
          if-no-files-found: error

  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python --version
          pip --version
          java -version
          flet --version
          flutter --version

      - name: Build APK
        run: |
          flutter config --no-analytics
          flet build apk "$APP_PATH" \
            --verbose \
            --build-number="$BUILD_NUMBER" \
            --build-version="$BUILD_VERSION"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-build
          path: build/apk
          if-no-files-found: error

  build-aab:
    name: Build AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python --version
          pip --version
          java -version
          flet --version
          flutter --version

      - name: Build AAB
        run: |
          flutter config --no-analytics
          flet build aab "$APP_PATH" \
            --verbose \
            --build-number="$BUILD_NUMBER" \
            --build-version="$BUILD_VERSION"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: aab-build
          path: build/aab
          if-no-files-found: error

  build-ipa:
    name: Build IPA
    runs-on: macos-latest

    env:
      IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}

    steps:
      - name: Check iOS signing configuration
        if: env.IOS_TEAM_ID == ''
        run: |
          echo "IOS_TEAM_ID secret is not set."
          echo "Skipping IPA build because iOS signing is required for a real IPA on CI."
          echo "Set repository secret IOS_TEAM_ID and add your Apple signing setup if you want IPA builds."

      - name: Checkout code
        if: env.IOS_TEAM_ID != ''
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        if: env.IOS_TEAM_ID != ''
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        if: env.IOS_TEAM_ID != ''
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install CocoaPods
        if: env.IOS_TEAM_ID != ''
        run: |
          sudo gem install cocoapods

      - name: Install Python dependencies
        if: env.IOS_TEAM_ID != ''
        run: |
          python -m pip install --upgrade pip
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python --version
          pip --version
          flet --version
          flutter --version
          pod --version

      - name: Build IPA
        if: env.IOS_TEAM_ID != ''
        run: |
          flutter config --no-analytics
          flet build ipa "$APP_PATH" \
            --verbose \
            --build-number="$BUILD_NUMBER" \
            --build-version="$BUILD_VERSION" \
            --team="$IOS_TEAM_ID"

      - name: Upload IPA artifact
        if: env.IOS_TEAM_ID != ''
        uses: actions/upload-artifact@v4
        with:
          name: ipa-build
          path: build/ipa
          if-no-files-found: error
